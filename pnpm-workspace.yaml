packages:
  - "packages/*"

allowBuilds:
  '@parcel/watcher': true
  '@tsparticles/engine': true
  cpu-features: true
  esbuild: true
  sharp: true
  ssh2: true
  unrs-resolver: true
  vue-demi: true

# Define a catalog of version ranges.
catalog:
  axios: ^1.8.4
  typescript: ^5.8.3
  vite: ^7.1.2
  vite-plugin-dts: ^4.5.4
